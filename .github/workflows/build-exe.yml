# ============================================================
# AgenticOS — One-Click .exe Build Pipeline
# Builds the NSIS self-contained installer on Windows
# Bundles Node.js runtime — no external dependencies required
# ============================================================

name: Build EXE Installer

on:
  push:
    branches: [main]
    paths:
      - 'installer/**'
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.0.1)'
        required: false
        default: ''

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  APP_VERSION: "2.0.0"

jobs:
  build-exe:
    name: Build One-Click EXE (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: npm-deps-windows-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            npm-deps-windows-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js standalone
        run: npm run build
        env:
          DATABASE_URL: "file:./release.db"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Download Node.js Windows runtime
        run: |
          mkdir -p installer/stage/node-runtime-minimal
          curl -sL "https://nodejs.org/dist/v20.11.1/node-v20.11.1-win-x64.zip" -o node-runtime.zip
          Expand-Archive -Path node-runtime.zip -DestinationPath node-runtime-extracted
          Copy-Item "node-runtime-extracted/node-v20.11.1-win-x64/node.exe" "installer/stage/node-runtime-minimal/node.exe"
        shell: pwsh

      - name: Stage application files
        run: |
          # Stage Next.js standalone
          New-Item -ItemType Directory -Force -Path "installer/stage/.next/standalone"
          Copy-Item -Recurse -Force ".next/standalone/*" "installer/stage/.next/standalone/"

          # Stage static files
          New-Item -ItemType Directory -Force -Path "installer/stage/.next/static"
          Copy-Item -Recurse -Force ".next/static/*" "installer/stage/.next/static/"

          # Stage public
          Copy-Item -Recurse -Force "public" "installer/stage/public"

          # Stage database
          Copy-Item -Recurse -Force "db" "installer/stage/db"

          # Stage Prisma
          Copy-Item -Recurse -Force "prisma" "installer/stage/prisma"

          # Stage node_modules (Prisma)
          New-Item -ItemType Directory -Force -Path "installer/stage/node_modules"
          Copy-Item -Recurse -Force "node_modules/.prisma" "installer/stage/node_modules/"
          Copy-Item -Recurse -Force "node_modules/@prisma" "installer/stage/node_modules/"
          Copy-Item -Recurse -Force "node_modules/prisma" "installer/stage/node_modules/"
        shell: pwsh

      - name: Install NSIS
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      - name: Compile NSIS installer
        run: |
          cd installer
          makensis installer-oneclick.nsi
        shell: cmd

      - name: Generate SHA256 checksum
        run: |
          $exe = "installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe"
          $hash = (Get-FileHash -Path $exe -Algorithm SHA256).Hash
          "$hash  $(Split-Path $exe -Leaf)" | Out-File -FilePath "installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe.sha256" -Encoding utf8
          Write-Host "SHA256: $hash"
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: AgenticOS-Setup-${{ env.APP_VERSION }}
          path: |
            installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe
            installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe.sha256
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe
            installer/AgenticOS-Setup-${{ env.APP_VERSION }}.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
