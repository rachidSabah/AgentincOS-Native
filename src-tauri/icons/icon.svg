<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" />
  <!-- Circuit pattern -->
  <g stroke="#e94560" stroke-width="2" fill="none" opacity="0.3">
    <line x1="128" y1="128" x2="200" y2="128" />
    <line x1="200" y1="128" x2="200" y2="200" />
    <line x1="200" y1="200" x2="128" y2="200" />
    <line x1="312" y1="128" x2="384" y2="128" />
    <line x1="384" y1="128" x2="384" y2="200" />
    <line x1="384" y1="200" x2="312" y2="200" />
    <line x1="128" y1="312" x2="200" y2="312" />
    <line x1="200" y1="312" x2="200" y2="384" />
    <line x1="312" y1="312" x2="384" y2="312" />
    <line x1="384" y1="312" x2="384" y2="384" />
  </g>
  <!-- Center AI brain node -->
  <circle cx="256" cy="256" r="72" fill="url(#accent)" opacity="0.9" />
  <circle cx="256" cy="256" r="48" fill="#1a1a2e" />
  <circle cx="256" cy="256" r="28" fill="url(#accent)" />
  <!-- Corner nodes -->
  <circle cx="128" cy="128" r="16" fill="#e94560" opacity="0.8" />
  <circle cx="384" cy="128" r="16" fill="#e94560" opacity="0.8" />
  <circle cx="128" cy="384" r="16" fill="#e94560" opacity="0.8" />
  <circle cx="384" cy="384" r="16" fill="#e94560" opacity="0.8" />
  <!-- Connection lines from center to corners -->
  <g stroke="#e94560" stroke-width="3" opacity="0.5">
    <line x1="200" y1="200" x2="144" y2="144" />
    <line x1="312" y1="200" x2="368" y2="144" />
    <line x1="200" y1="312" x2="144" y2="368" />
    <line x1="312" y1="312" x2="368" y2="368" />
  </g>
  <!-- Text label -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#e94560" letter-spacing="3">AGENTIC OS</text>
</svg>
